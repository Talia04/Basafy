name: iOS Archive

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ios-archive:
    runs-on: macos-14
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Install Node dependencies
        working-directory: basafy-mobile/basafy-rn-expo
        run: npm ci

      - name: Install Pods
        working-directory: basafy-mobile/basafy-rn-expo/ios
        run: pod install

      - name: Xcode Archive
        run: >
          xcodebuild archive
          -workspace basafy-mobile/basafy-rn-expo/ios/Basafy.xcworkspace
          -scheme Basafy
          -destination generic/platform=iOS
          -archivePath ${{ github.workspace }}/build.xcarchive
          -derivedDataPath ${{ github.workspace }}/DerivedData
          -resultBundleVersion 3
          -resultBundlePath ${{ github.workspace }}/resultbundle.xcresult
          -resultStreamPath ${{ github.workspace }}/resultBundleStream.json
          -IDEPostProgressNotifications=YES
          CODE_SIGN_IDENTITY=-
          AD_HOC_CODE_SIGNING_ALLOWED=YES
          CODE_SIGN_STYLE=Automatic
          DEVELOPMENT_TEAM=A8395U72T7
          COMPILER_INDEX_STORE_ENABLE=NO
          -hideShellScriptEnvironment
